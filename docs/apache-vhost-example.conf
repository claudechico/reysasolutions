# Example Apache VirtualHost configuration for serving the SPA
# Replace /var/www/your-site-root with the path to your dist folder

<VirtualHost *:80>
    ServerName web.reysasolutions.co.tz
    DocumentRoot /var/www/your-site-root

    <Directory /var/www/your-site-root>
        AllowOverride All
        Require all granted
    </Directory>

    # Optional: redirect 404 to index.html as a fallback
    ErrorDocument 404 /index.html

    # You can enable other security headers here
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
</VirtualHost>
